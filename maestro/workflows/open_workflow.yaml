# Opens a workflow paywall (offering `default_workflows`), navigates all three screens via the
# "Continue" button, purchases on the last one, then asserts the entitlement unlocks.
# Local-only (not under e2e_tests/, so the CI job does not run it).
#
# Run locally against the test store:
#   maestro test -e MAESTRO_STORE=test_store maestro/workflows/open_workflow.yaml

appId: com.revenuecat.e2etests
name: Navigate a workflow paywall to purchase
env:
  MAESTRO_STORE: ${MAESTRO_STORE || 'test_store'}

---
- launchApp:
    clearState: true
    arguments:
      e2e_test_flow: open_workflow
- extendedWaitUntil:
    visible: "Present Paywall"
    timeout: 15000
- tapOn:
    text: "Present Paywall"

# Screen 1
- extendedWaitUntil:
    visible: "Start Your Free Week And Reclaim 30+ Minutes Daily"
    timeout: 15000
- takeScreenshot: "open_workflow - screen 1"
- tapOn:
    text: "Continue"

# Screen 2
- extendedWaitUntil:
    visible: "Most People Feel Calmer After Just 3 Sessions"
    timeout: 15000
- takeScreenshot: "open_workflow - screen 2"
- tapOn:
    text: "Continue"

# Paywall screen; the last Continue starts the purchase.
- extendedWaitUntil:
    visible: "People Who Meditate Daily Sleep 40% Better"
    timeout: 15000
- takeScreenshot: "open_workflow - paywall screen"
- tapOn:
    text: "Continue"

# Test store purchase confirmation.
- extendedWaitUntil:
    visible: "TEST VALID PURCHASE"
    timeout: 15000
- tapOn:
    text: "TEST VALID PURCHASE"

- extendedWaitUntil:
    visible: "entitlement (pro): active"
    timeout: 15000
- takeScreenshot: "open_workflow - unlocked entitlement"
