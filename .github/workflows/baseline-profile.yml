name: Generate Baseline Profiles

on:
  # Biweekly: every Monday at 9 AM CEST (7 AM UTC)
  # The biweekly check is enforced in the "check-schedule" step below.
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  generate-baseline-profiles:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check biweekly schedule
        id: schedule-check
        if: github.event_name == 'schedule'
        run: |
          # Run only on even ISO weeks to achieve biweekly cadence.
          # workflow_dispatch always runs regardless.
          WEEK=$(date +%V)
          if [ $(( WEEK % 2 )) -ne 0 ]; then
            echo "Skipping — odd week ($WEEK)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Running — even week ($WEEK)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule-check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up JDK
        if: steps.schedule-check.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        if: steps.schedule-check.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build target app
        if: steps.schedule-check.outputs.skip != 'true'
        run: ./gradlew :examples:paywall-tester:assembleNonMinifiedRelease

      - name: Clean managed devices
        if: steps.schedule-check.outputs.skip != 'true'
        run: ./gradlew cleanManagedDevices --unused-only

      - name: Generate Baseline Profiles
        if: steps.schedule-check.outputs.skip != 'true'
        run: |
          ./gradlew generateBaselineProfile \
            -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect" \
            -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=BaselineProfile \
            -Pandroid.experimental.testOptions.managedDevices.setupTimeoutMinutes=20 \
            -Dorg.gradle.workers.max=4

      - name: Create Pull Request
        if: steps.schedule-check.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update baseline profiles"
          title: "Update baseline profiles"
          body: |
            Automated baseline profile regeneration.

            Generated by the `Generate Baseline Profiles` workflow.
          branch: actions/baseline-profiles
          delete-branch: true
          labels: pr:other
          reviewers: skydoves
